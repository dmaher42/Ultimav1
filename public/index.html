<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=../index.html" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Britannia Reborn</title>
    <link rel="canonical" href="../index.html" />
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', sans-serif;
        background: radial-gradient(circle at 30% 20%, #101628, #04070f 70%);
        color: #f3efe3;
      }
      a {
        color: #ffe6aa;
      }
      #character-creator { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10000; background: rgba(0,0,0,0.9); }
      .hidden { display: none !important; }
      
      @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        10-20% { transform: translate(-1px, -2px) rotate(-1deg); }
        30-40% { transform: translate(-3px, 0px) rotate(1deg); }
        50-60% { transform: translate(3px, 2px) rotate(0deg); }
        70-80% { transform: translate(-1px, -1px) rotate(1deg); }
        90-100% { transform: translate(1px, 2px) rotate(0deg); }
      }
      .shake { animation: shake 0.4s; }
      .dialogue-opt {
        background: #8c7853; border: 1px solid #fe5; color: white;
        padding: 5px 15px; cursor: pointer; margin-right: 10px;
        font-family: inherit; font-size: 0.9em; transition: background 0.2s;
      }
      .dialogue-opt:hover { background: #a68d63; }
    </style>
  </head>
  <body>
    <div>
      <p>Redirecting to the main game…</p>
      <p>
        If you are not redirected automatically, <a href="../index.html">open Britannia Reborn</a>.
      </p>
    </div>
  </body>
</html>
